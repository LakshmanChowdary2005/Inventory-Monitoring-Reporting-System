<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Stock Logs</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
            font-family:Arial;
        }

        .sidebar{
            width:220px;
            height:100vh;
            background:#212529;
            color:white;
            position:fixed;
        }

        .sidebar a{
            color:white;
            display:block;
            padding:12px;
            text-decoration:none;
        }

        .sidebar a:hover{
            background:#495057;
        }

        .content{
            margin-left:230px;
            padding:20px;
        }

    </style>

</head>

<body>

<div class="sidebar">

    <h4 class="p-3">Inventory</h4>

    <a href="/">Dashboard</a>
    <a href="/products">Products</a>
    <a href="/logs">Stock Logs</a>
    <a href="/export-csv">Download CSV</a>
    <a href="/export-pdf">Download PDF</a>

</div>

<div class="content">

    <h2>Stock Activity Logs</h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

        <tr>
            <th>Action</th>
            <th>Item</th>
            <th>Quantity</th>
            <th>Time</th>
        </tr>

        </thead>

        <tbody>

        <tr th:each="l:${logs}">

            <td th:text="${l.action}"></td>
            <td th:text="${l.itemName}"></td>
            <td th:text="${l.quantity}"></td>
            <td th:text="${l.time}"></td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
