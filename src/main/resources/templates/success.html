<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Login Success</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CONFETTI LIB -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            font-family:'Segoe UI';
            color:white;
            overflow:hidden;
        }

        /* CARD */
        .box{
            text-align:center;
            background:rgba(255,255,255,0.15);
            padding:50px;
            border-radius:20px;
            backdrop-filter:blur(20px);
            box-shadow:0 0 30px rgba(0,0,0,0.3);
        }

        /* CHECK */
        .check{
            font-size:90px;
            animation:pop 0.6s ease, glow 1.5s infinite alternate;
        }

        @keyframes pop{
            0%{transform:scale(0);}
            100%{transform:scale(1);}
        }

        @keyframes glow{
            from{filter:drop-shadow(0 0 5px white);}
            to{filter:drop-shadow(0 0 20px white);}
        }

        /* PROGRESS BAR */
        .progress{
            height:10px;
            margin-top:20px;
        }

        .progress-bar{
            animation:load 2s linear forwards;
        }

        @keyframes load{
            from{width:0%;}
            to{width:100%;}
        }

    </style>

</head>

<body>

<div class="box">

    <div class="check">✅</div>

    <h2 class="mt-3">Login Successful!</h2>

    <p>Welcome! Preparing your dashboard...</p>

    <h5 th:text="'Role: ' + ${session.role}"></h5>

    <!-- PROGRESS BAR -->
    <div class="progress">
        <div class="progress-bar bg-light"></div>
    </div>

</div>

<script>

    // 🎉 CONFETTI BURST
    function fireConfetti(){
        confetti({
            particleCount: 150,
            spread: 70,
            origin: { y: 0.6 }
        });
    }

    // 🔊 SOUND (optional)
    function playSound(){
        let audio = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
        audio.play();
    }

    // RUN EFFECTS
    window.onload = function(){
        fireConfetti();
        playSound();
    };

    // 🚀 REDIRECT
    setTimeout(()=>{

        let role = "[[${session.role}]]";

        if(role === "USER"){
            window.location.href="/user-dashboard";
        } else {
            window.location.href="/dashboard";
        }

    },2000);

</script>

</body>
</html>
