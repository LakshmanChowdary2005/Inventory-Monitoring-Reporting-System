<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
            font-family:'Poppins',sans-serif;

            background: linear-gradient(-45deg,#667eea,#764ba2,#43cea2,#185a9d);
            background-size:400% 400%;
            animation:bg 10s ease infinite;
        }

        @keyframes bg{
            0%{background-position:0% 50%;}
            50%{background-position:100% 50%;}
            100%{background-position:0% 50%;}
        }

        /* LOGIN BOX */
        .login-box{
            width:420px;
            padding:40px;
            border-radius:20px;

            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(20px);

            color:white;
            box-shadow:0 10px 40px rgba(0,0,0,0.4);

            animation:slideIn 1s ease;
            position:relative;
        }

        @keyframes slideIn{
            from{transform:translateY(40px);opacity:0;}
            to{transform:translateY(0);opacity:1;}
        }

        /* INPUT GROUP */
        .input-group{
            position:relative;
            margin-bottom:20px;
        }

        .input-group input{
            width:100%;
            padding:12px;
            border:none;
            border-radius:10px;
            background:rgba(255,255,255,0.2);
            color:white;
            outline:none;
        }

        .input-group label{
            position:absolute;
            top:12px;
            left:12px;
            color:#ddd;
            font-size:14px;
            transition:0.3s;
        }

        .input-group input:focus + label,
        .input-group input:valid + label{
            top:-10px;
            left:10px;
            font-size:12px;
            color:#fff;
        }

        /* EYE ICON */
        .eye{
            position:absolute;
            right:12px;
            top:12px;
            cursor:pointer;
        }

        /* BUTTON */
        .btn-login{
            width:100%;
            border-radius:25px;
            font-weight:600;
            transition:0.3s;
        }

        .btn-login:hover{
            transform:scale(1.05);
            box-shadow:0 0 15px rgba(255,255,255,0.7);
        }

        /* SHAKE */
        .shake{
            animation:shake 0.4s;
        }

        @keyframes shake{
            25%{transform:translateX(-8px)}
            50%{transform:translateX(8px)}
            75%{transform:translateX(-8px)}
        }

        /* SUCCESS SCREEN */
        .success-screen{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:linear-gradient(45deg,#22c55e,#16a34a);
            display:none;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            color:white;
            font-size:30px;
            z-index:999;
            animation:fadeIn 0.5s;
        }

        @keyframes fadeIn{
            from{opacity:0}
            to{opacity:1}
        }

        /* ERROR */
        #errorMsg{
            display:none;
        }

        /* LOADER */
        .loader{
            display:none;
            text-align:center;
            margin-top:10px;
        }

    </style>
</head>

<body>

<!-- SUCCESS -->
<div class="success-screen" id="successScreen">
    ✔ Welcome!
    <small style="font-size:16px;">Redirecting...</small>
</div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

    <h3 class="text-center mb-4">🔐 Inventory Login</h3>

    <div id="errorMsg" class="alert alert-danger text-center">
        ❌ Invalid Username or Password
    </div>

    <form id="loginForm" action="/login" method="post">

        <div class="input-group">
            <input type="text" name="username" id="username" required>
            <label>Username</label>
        </div>

        <div class="input-group">
            <input type="password" name="password" id="password" required>
            <label>Password</label>
            <span class="eye" onclick="togglePassword()">👁</span>
        </div>

        <select name="role" class="form-control mb-3">
            <option value="ADMIN">Admin</option>
            <option value="MANAGER">Manager</option>
            <option value="USER">User</option>
        </select>

        <div class="form-check text-white mb-3">
            <input type="checkbox" id="remember">
            <label>Remember Me</label>
        </div>

        <button class="btn btn-primary btn-login">Login</button>

        <div class="loader" id="loader">
            <div class="spinner-border text-light"></div>
            <p>Checking...</p>
        </div>

    </form>

</div>

<script>

    // SHOW PASSWORD
    function togglePassword(){
        let p=document.getElementById("password");
        p.type = p.type === "password" ? "text" : "password";
    }

    // REMEMBER
    window.onload=function(){
        let saved = localStorage.getItem("user");
        if(saved){
            document.getElementById("username").value = saved;
            document.getElementById("remember").checked = true;
        }
    }

    // SUBMIT
    document.getElementById("loginForm").addEventListener("submit", function(){

        let remember = document.getElementById("remember").checked;
        let user = document.getElementById("username").value;

        if(remember){
            localStorage.setItem("user", user);
        } else {
            localStorage.removeItem("user");
        }

        document.getElementById("loader").style.display = "block";
    });

    // ERROR SHAKE
    const params = new URLSearchParams(window.location.search);

    if(params.has("error")){
        let box = document.getElementById("loginBox");
        document.getElementById("errorMsg").style.display = "block";

        setTimeout(()=>box.classList.add("shake"),100);
        setTimeout(()=>box.classList.remove("shake"),600);
    }

    // SUCCESS
    if(params.has("success")){
        document.getElementById("successScreen").style.display = "flex";

        setTimeout(()=>{
            window.location.href="/dashboard";
        },1500);
    }

</script>

</body>
</html>
