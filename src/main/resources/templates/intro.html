<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>Inventory System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>

        body{
            font-family:'Poppins',sans-serif;
            margin:0;
        }

        /* HERO */
        .hero{
            height:100vh;
            background:linear-gradient(135deg,#667eea,#764ba2);
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            color:white;
        }

        /* BUTTON */
        .btn-main{
            margin-top:20px;
            padding:12px 35px;
            border-radius:30px;
            background:white;
            color:black;
            font-weight:600;
        }

        /* INFO BOX */
        .info-box{
            background:rgba(255,255,255,0.15);
            padding:20px;
            border-radius:15px;
            backdrop-filter:blur(10px);
            margin-top:20px;
        }

        /* CHATBOT */
        #chat-btn{
            position:fixed;
            bottom:20px;
            right:20px;
            background:#667eea;
            color:white;
            padding:15px;
            border-radius:50%;
            cursor:pointer;
        }

        #chatbox{
            position:fixed;
            bottom:80px;
            right:20px;
            width:300px;
            background:white;
            border-radius:10px;
            display:none;
        }

        .chat-header{
            background:#667eea;
            color:white;
            padding:10px;
        }

        .chat-body{
            height:200px;
            overflow-y:auto;
            padding:10px;
        }

        .bot{
            background:#eee;
            padding:8px;
            border-radius:10px;
            margin:5px 0;
        }

        .user{
            background:#667eea;
            color:white;
            padding:8px;
            border-radius:10px;
            margin:5px 0;
            text-align:right;
        }

        .chat-input{
            display:flex;
        }

        .chat-input input{
            flex:1;
            border:none;
            padding:10px;
        }

        .chat-input button{
            background:#667eea;
            color:white;
            border:none;
            padding:10px;
        }

    </style>

</head>

<body>

<!-- HERO -->
<div class="hero">

    <div class="container">

        <h1>📦 Inventory System</h1>
        <p id="typing"></p>

        <a href="/login">
            <button class="btn-main">🚀 Get Started</button>
        </a>

        <!-- INFO BOXES -->
        <div class="row mt-5">

            <div class="col-md-3">
                <div class="info-box">
                    <h5>📊 Analytics</h5>
                    <p>Track inventory</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="info-box">
                    <h5>🔔 Alerts</h5>
                    <p>Low stock alerts</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="info-box">
                    <h5>⚡ Fast</h5>
                    <p>Quick system</p>
                </div>
            </div>

            <div class="col-md-3">
                <div class="info-box">
                    <h5>🔐 Secure</h5>
                    <p>Role-based access</p>
                </div>
            </div>

        </div>

    </div>

</div>

<!-- CHATBOT -->
<div id="chat-btn" onclick="toggleChat()">💬</div>

<div id="chatbox">
    <div class="chat-header">🤖 Inventory Bot</div>

    <div class="chat-body" id="chat-body">
        <p class="bot">👋 Hi! Ask me anything about the system.</p>
    </div>

    <div class="chat-input">
        <input id="userInput" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<!-- SCRIPTS -->
<script>

    // TYPING EFFECT
    let texts=["Manage Inventory","Track Stock","Grow Business"];
    let i=0,j=0,del=false;

    function type(){
        let txt=texts[i];
        document.getElementById("typing").innerText=txt.substring(0,j);

        if(!del){j++; if(j>txt.length){del=true;}}
        else{j--; if(j==0){del=false;i=(i+1)%texts.length;}}

        setTimeout(type,100);
    }
    type();

    // CHAT TOGGLE
    function toggleChat(){
        let box=document.getElementById("chatbox");
        box.style.display = box.style.display==="block"?"none":"block";
    }

    // SEND MESSAGE
    function sendMessage(){
        let input=document.getElementById("userInput");
        let text=input.value;
        if(text==="") return;

        addMsg(text,"user");

        setTimeout(()=>reply(text),800);

        input.value="";
    }

    // ADD MESSAGE
    function addMsg(msg,type){
        let body=document.getElementById("chat-body");
        let p=document.createElement("p");
        p.className=type;
        p.innerText=msg;
        body.appendChild(p);
        body.scrollTop=body.scrollHeight;
    }

    // BOT MESSAGE WITH TYPING EFFECT
    function botMessage(msg){
        let body=document.getElementById("chat-body");
        let p=document.createElement("p");
        p.className="bot";
        body.appendChild(p);

        let i=0;
        let interval=setInterval(()=>{
            p.innerText += msg.charAt(i);
            i++;
            if(i>=msg.length) clearInterval(interval);
        },20);

        body.scrollTop=body.scrollHeight;
    }

    // SMART REPLY
    function reply(text){

        text=text.toLowerCase();

        if(text.includes("hi") || text.includes("hello")){
            botMessage("👋 Hello! Welcome to Inventory System.");
        }

        else if(text.includes("what")){
            botMessage("📦 This system manages inventory, tracks stock and alerts.");
        }

        else if(text.includes("feature")){
            botMessage("✨ Features: Analytics 📊, Alerts 🔔, Fast ⚡.");
        }

        else if(text.includes("login")){
            botMessage("🔐 Click 'Get Started' to login.");
        }

        else if(text.includes("stock")){
            botMessage("📦 You can monitor stock and get alerts.");
        }

        else if(text.includes("admin")){
            botMessage("👨‍💼 Admin controls inventory.");
        }

        else if(text.includes("user")){
            botMessage("👤 Users can only view products.");
        }

        else{
            botMessage("🤖 I didn’t understand. Try asking about features or login.");
        }

    }

</script>

</body>
</html>
