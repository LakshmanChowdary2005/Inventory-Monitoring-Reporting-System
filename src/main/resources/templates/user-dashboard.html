<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Product Availability</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#eef2f7;
            font-family:'Segoe UI';
        }

        .container-box{
            max-width:900px;
            margin:auto;
            margin-top:50px;
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .low-row{
            background:#f8d7da;
        }

        .badge-low{background:#f59e0b;color:white;padding:3px 8px;border-radius:10px;}
        .badge-medium{background:#facc15;padding:3px 8px;border-radius:10px;}
        .badge-high{background:#22c55e;color:white;padding:3px 8px;border-radius:10px;}

    </style>

</head>

<body>

<div class="container-box">

    <h3 class="mb-4 text-center">📦 Product Availability</h3>

    <table class="table table-hover">

        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Quantity</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="p:${products}" th:classappend="${p.quantity<3}?'low-row':''">

            <td th:text="${p.name}"></td>
            <td th:text="${p.category}"></td>
            <td th:text="${p.quantity}"></td>

            <td>
                <span th:if="${p.quantity<3}" class="badge-low">LOW</span>
                <span th:if="${p.quantity>=3 and p.quantity<=10}" class="badge-medium">MEDIUM</span>
                <span th:if="${p.quantity>10}" class="badge-high">HIGH</span>
            </td>

        </tr>

        </tbody>

    </table>

    <div class="text-center mt-3">
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

</div>

</body>
</html>
