<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <title>Inventory Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body{
            background:#eef2f7;
            font-family:'Segoe UI',sans-serif;
        }

        /* SIDEBAR */
        .sidebar{
            width:240px;
            height:100vh;
            background:linear-gradient(180deg,#1e293b,#0f172a);
            position:fixed;
            color:white;
            padding:20px;
        }

        .sidebar a{
            display:block;
            color:#cbd5e1;
            padding:12px;
            text-decoration:none;
            border-radius:10px;
            margin-bottom:8px;
        }

        .sidebar a:hover{
            background:#334155;
        }

        .content{
            margin-left:260px;
            padding:20px;
        }

        .card-box{
            border-radius:15px;
            padding:20px;
            color:white;
        }

        .bg1{background:linear-gradient(45deg,#667eea,#764ba2);}
        .bg2{background:linear-gradient(45deg,#43e97b,#38f9d7);}
        .bg3{background:linear-gradient(45deg,#ff6a00,#ee0979);}

        /* 🔴 BLINK ALERT */
        .alert-box{
            background:#ff1e1e;
            color:white;
            padding:12px;
            text-align:center;
            border-radius:12px;
            font-weight:bold;
            animation:blink 1s infinite;
            box-shadow:0 0 15px rgba(255,0,0,0.7);
        }

        @keyframes blink{
            0%{opacity:1;}
            50%{opacity:0.3;}
            100%{opacity:1;}
        }

        .low-row{background:#f8d7da;}

        .badge-low{background:#f59e0b;color:white;padding:4px 10px;border-radius:10px;}
        .badge-medium{background:#facc15;color:black;padding:4px 10px;border-radius:10px;}
        .badge-high{background:#22c55e;color:white;padding:4px 10px;border-radius:10px;}

        .chart-box{
            background:white;
            padding:20px;
            border-radius:15px;
            height:300px;
            box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <h4>📦 Inventory</h4>

    <a href="/dashboard">🏠 Dashboard</a>
    <a href="/logs">📜 Logs</a>

    <a href="/export-csv" class="btn btn-success w-100 mt-2">CSV</a>
    <a href="/export-pdf" class="btn btn-danger w-100 mt-2">PDF</a>

    <a href="/logout">🚪 Logout</a>

</div>

<!-- CONTENT -->
<div class="content">

    <h2>📊 Dashboard</h2>

    <!-- 🔴 LOW STOCK ALERT -->
    <div th:if="${lowStock > 0}" class="alert-box mt-3">
        ⚠️ Low Stock Alert: <span th:text="${lowStock}"></span>
    </div>

    <!-- CARDS -->
    <div class="row mt-4">

        <div class="col-md-4">
            <div class="card-box bg1">
                <h5>Total Products</h5>
                <h3 th:text="${totalProducts}"></h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box bg2">
                <h5>Total Value</h5>
                <h3>₹ <span th:text="${totalValue}"></span></h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card-box bg3">
                <h5>Low Stock</h5>
                <h3 th:text="${lowStock}"></h3>
            </div>
        </div>

    </div>

    <!-- SEARCH -->
    <div class="card p-3 mt-4">
        <input type="text" id="searchBox" class="form-control" placeholder="🔍 Search products...">
    </div>

    <!-- ADD PRODUCT -->
    <div class="card p-3 mt-4">

        <h5>➕ Add Product</h5>

        <form action="/add-product" method="post">

            <div class="row">

                <div class="col-md-3">
                    <input name="name" class="form-control" placeholder="Product Name" required>
                </div>

                <div class="col-md-3">
                    <input name="category" class="form-control" placeholder="Category" required>
                </div>

                <div class="col-md-2">
                    <input name="quantity" type="number" class="form-control" placeholder="Qty" required>
                </div>

                <div class="col-md-2">
                    <input name="price" type="number" class="form-control" placeholder="Price" required>
                </div>

                <div class="col-md-2">
                    <button class="btn btn-success w-100">Add</button>
                </div>

            </div>

        </form>

    </div>

    <!-- PRODUCT TABLE -->
    <div class="card p-3 mt-4">

        <h5>📦 Product List</h5>

        <table class="table table-hover" id="productTable">

            <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Qty</th>
                <th>Status</th>
                <th>Stock</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="p:${products}" th:classappend="${p.quantity < 3} ? 'low-row' : ''">

                <td th:text="${p.name}"></td>
                <td th:text="${p.category}"></td>
                <td th:text="${p.quantity}"></td>

                <td>
                    <span th:if="${p.quantity < 3}" class="badge-low">LOW</span>
                    <span th:if="${p.quantity <=10 and p.quantity >=3}" class="badge-medium">MEDIUM</span>
                    <span th:if="${p.quantity >10}" class="badge-high">HIGH</span>
                </td>

                <td>
                    <div class="progress" style="height:8px;">
                        <div class="progress-bar bg-success"
                             th:style="'width:' + (${p.quantity} * 10) + '%'"></div>
                    </div>
                </td>

                <td th:text="${p.price}"></td>

                <td>
                    <a th:href="@{'/increase/' + ${p.id}}" class="btn btn-success btn-sm">+</a>
                    <a th:href="@{'/decrease/' + ${p.id}}" class="btn btn-warning btn-sm">-</a>
                    <a th:href="@{'/delete/' + ${p.id}}" onclick="return confirm('Delete?')" class="btn btn-danger btn-sm">Delete</a>
                </td>

            </tr>

            </tbody>

        </table>

    </div>

    <!-- CHARTS -->
    <div class="row mt-4">

        <div class="col-md-6">
            <div class="chart-box">
                <canvas id="barChart"></canvas>
            </div>
        </div>

        <div class="col-md-6">
            <div class="chart-box">
                <canvas id="pieChart"></canvas>
            </div>
        </div>

    </div>

</div>

<script>

    // 🔍 SEARCH
    document.getElementById("searchBox").addEventListener("keyup", function(){
        let value = this.value.toLowerCase();
        let rows = document.querySelectorAll("#productTable tbody tr");

        rows.forEach(row => {
            row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
        });
    });

    let total = [[${totalProducts}]];
    let low = [[${lowStock}]];

    new Chart(document.getElementById("barChart"), {
        type: 'bar',
        data: {
            labels: ["Products", "Low Stock"],
            datasets: [{
                data: [total, low],
                backgroundColor: ["#4e73df", "#e74a3b"]
            }]
        }
    });

    new Chart(document.getElementById("pieChart"), {
        type: 'doughnut',
        data: {
            labels: ["Available", "Low"],
            datasets: [{
                data: [total-low, low],
                backgroundColor: ["#1cc88a", "#f6c23e"]
            }]
        }
    });

</script>

</body>
</html>
